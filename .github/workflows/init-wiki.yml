name: Initialize Wiki

on:
  workflow_dispatch:

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create wiki pages and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to clone existing wiki repo
          if git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/toinevl/apkwekker.wiki.git" wiki 2>/dev/null; then
            echo "Wiki repo exists"
          else
            echo "Wiki repo does not exist, initializing..."
            mkdir -p wiki
            cd wiki
            git init
            git checkout -b main
          fi

          cd wiki

          # Write all wiki pages from base64-encoded content
          echo "" | base64 -d > Home.md
          echo "" | base64 -d > Architecture.md
          echo "" | base64 -d > Deployment.md
          echo "" | base64 -d > Business-Plan.md
          echo "" | base64 -d > Marketing.md
          echo "" | base64 -d > Artifact-Log.md

          git add -A
          git commit -m "Initialize wiki with 6 pages" || echo "Nothing to commit"

          # Push
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/toinevl/apkwekker.wiki.git"
          git push -u origin main --force 2>/dev/null || git push -u origin master --force
