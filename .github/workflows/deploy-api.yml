name: Deploy API (Functions Flex)

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install, test, build
        working-directory: api
        run: |
          npm ci
          npm test
          npm run build

      - name: Prune dev dependencies
        working-directory: api
        run: npm prune --omit=dev

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-apkwekker
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          sku: flexconsumption
          remote-build: false

      - name: Smoke test (cold start wait — lesson learned)
        run: |
          sleep 60
          echo "health check:"
          curl -sf https://func-apkwekker.azurewebsites.net/api/health
          echo ""
          echo "error path check (expect 400):"
          code=$(curl -s -o /dev/null -w "%{http_code}" https://func-apkwekker.azurewebsites.net/api/vehicle/XX)
          if [ "$code" != "400" ]; then echo "Expected 400, got $code" && exit 1; fi
          echo "OK"
