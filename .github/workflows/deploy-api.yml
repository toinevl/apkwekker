name: Deploy API (Functions Flex)

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install, test, build
        working-directory: api
        run: |
          npm ci
          npm test
          npm run build

      - name: Prune dev dependencies
        working-directory: api
        run: npm prune --omit=dev

      - name: Zip API package
        working-directory: api
        run: zip -r ../apkwekker-api.zip dist host.json package.json node_modules -x "*/test/*" "*.map"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions (Flex Consumption)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az functionapp deploy \
              --resource-group rg-apkwekker \
              --name func-apkwekker \
              --src-path apkwekker-api.zip \
              --type zip \
              --async false || true

      - name: Smoke test (cold start wait — lesson learned)
        run: |
          sleep 60
          echo "health check:"
          curl -sf https://func-apkwekker.azurewebsites.net/api/health
          echo ""
          echo "error path check (expect 400 or 404):"
          code=$(curl -s -o /dev/null -w "%{http_code}" https://func-apkwekker.azurewebsites.net/api/vehicle/XX)
          if [ "$code" != "400" ] && [ "$code" != "404" ]; then echo "Expected 400/404, got $code" && exit 1; fi
          echo "OK"
